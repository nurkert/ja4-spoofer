name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v, e.g. 1.2.3'
        required: true
        type: string
      build_number:
        description: 'Debian revision (optional, defaults to run number)'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux .deb (amd64)
    runs-on: ubuntu-latest
    # Build inside Debian Bullseye so the resulting binaries link against
    # glibc 2.31 — that makes the .deb run on Debian 11/12, Ubuntu 20.04+
    # and derivatives. Without this the runner's modern glibc would leak
    # into the binary and break installs on older systems.
    container: debian:bullseye-slim

    steps:
      - name: Bootstrap container tools
        run: |
          set -e
          for i in 1 2 3; do
            apt-get update && \
            apt-get install -y --no-install-recommends --fix-missing \
              git curl ca-certificates xz-utils unzip sudo rsync \
              perl jq && break
            echo "apt attempt $i failed, retrying..."
            sleep 5
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            BUILD_NUMBER="${{ inputs.build_number }}"
            if [[ -z "$BUILD_NUMBER" ]]; then
              BUILD_NUMBER="${{ github.run_number }}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            PUBSPEC_VERSION="$(awk '/^version:/ {print $2}' tools/ja4-spoofer/pubspec.yaml)"
            PUBSPEC_APP_VERSION="${PUBSPEC_VERSION%%+*}"
            BUILD_NUMBER="${PUBSPEC_VERSION#*+}"
            if [[ "$BUILD_NUMBER" == "$PUBSPEC_VERSION" ]]; then
              BUILD_NUMBER="1"
            fi
            if [[ "$PUBSPEC_APP_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag $TAG does not match pubspec version $PUBSPEC_APP_VERSION"
              exit 1
            fi
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be X.Y.Z, got: $VERSION"
            exit 1
          fi
          if [[ ! "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Build number must be numeric, got: $BUILD_NUMBER"
            exit 1
          fi

          TAG="v$VERSION"
          echo "VERSION=$VERSION"           >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "TAG=$TAG"                   >> "$GITHUB_ENV"

      - name: Bump pubspec version and tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          perl -0pi -e \
            's/^version:\s+.*/version: '"$VERSION+$BUILD_NUMBER"'/m' \
            tools/ja4-spoofer/pubspec.yaml

          git add tools/ja4-spoofer/pubspec.yaml
          if ! git diff --cached --quiet; then
            git commit -m "release $TAG"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
              "HEAD:${GITHUB_REF_NAME}"
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            "$TAG"

      - name: Sync bundled-runtime assets from repo root
        run: bash tools/ja4-spoofer/scripts/sync_bundled_runtime.sh

      - name: Install build dependencies
        run: |
          set -e
          # Flutter's native_assets toolchain expects the full LLVM tool
          # set (clang, ld.lld, llvm-ar, llvm-nm, llvm-strip, ...) next to
          # clang-11. clang, lld and llvm together cover them all.
          for i in 1 2 3; do
            apt-get install -y --no-install-recommends --fix-missing \
              clang lld llvm cmake ninja-build pkg-config \
              libgtk-3-dev liblzma-dev dpkg-dev libstdc++-10-dev && break
            echo "apt attempt $i failed, retrying..."
            sleep 5
          done

      - name: Install Flutter
        shell: bash
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version
          "$HOME/flutter/bin/flutter" config --enable-linux-desktop

      - name: Flutter pub get
        working-directory: tools/ja4-spoofer
        run: flutter pub get

      - name: Build .deb
        shell: bash
        run: |
          bash tools/ja4-spoofer/scripts/package_linux_deb.sh \
            --no-sync \
            --version      "$VERSION" \
            --build-number "$BUILD_NUMBER"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ja4-spoofer-${{ env.VERSION }}-linux-amd64
          path: tools/ja4-spoofer/dist/*.deb
          retention-days: 30

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TAG }}
          name: JA4 Spoofer ${{ env.TAG }}
          artifacts: tools/ja4-spoofer/dist/*.deb
          artifactErrorsFailBuild: true
          allowUpdates: true
          makeLatest: true
          body: |
            Install on Debian/Ubuntu:

            ```bash
            sudo dpkg -i ja4-spoofer_*.deb
            sudo apt-get install -f   # resolves any missing deps
            ```

            Then launch with `ja4-spoofer` or from the applications menu.
            On first launch the app extracts its scripts, configs and patches to
            `~/.ja4-spoofer/runtime/<version>/` — no repository checkout needed.
