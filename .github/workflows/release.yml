name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v, e.g. 1.2.3'
        required: true
        type: string
      build_number:
        description: 'Debian revision (optional, defaults to run number)'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  # Made available so steps can test `if: env.GPG_PRIVATE_KEY != ''`.
  # Empty if the secret isn't configured — signing then skips gracefully.
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

jobs:
  build:
    name: Build Linux .deb (amd64)
    runs-on: ubuntu-latest
    # Build inside Debian Bullseye so the resulting binaries link against
    # glibc 2.31 — that makes the .deb run on Debian 11/12, Ubuntu 20.04+
    # and derivatives. Without this the runner's modern glibc would leak
    # into the binary and break installs on older systems.
    container: debian:bullseye-slim

    steps:
      - name: Bootstrap container tools
        run: |
          set -e
          for i in 1 2 3; do
            apt-get update && \
            apt-get install -y --no-install-recommends --fix-missing \
              git curl ca-certificates xz-utils unzip sudo rsync \
              perl jq gnupg && break
            echo "apt attempt $i failed, retrying..."
            sleep 5
          done

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            BUILD_NUMBER="${{ inputs.build_number }}"
            if [[ -z "$BUILD_NUMBER" ]]; then
              BUILD_NUMBER="${{ github.run_number }}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            PUBSPEC_VERSION="$(awk '/^version:/ {print $2}' tools/ja4-spoofer/pubspec.yaml)"
            PUBSPEC_APP_VERSION="${PUBSPEC_VERSION%%+*}"
            BUILD_NUMBER="${PUBSPEC_VERSION#*+}"
            if [[ "$BUILD_NUMBER" == "$PUBSPEC_VERSION" ]]; then
              BUILD_NUMBER="1"
            fi
            if [[ "$PUBSPEC_APP_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag $TAG does not match pubspec version $PUBSPEC_APP_VERSION"
              exit 1
            fi
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be X.Y.Z, got: $VERSION"
            exit 1
          fi
          if [[ ! "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Build number must be numeric, got: $BUILD_NUMBER"
            exit 1
          fi

          TAG="v$VERSION"
          {
            echo "VERSION=$VERSION"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
            echo "TAG=$TAG"
          } >> "$GITHUB_ENV"

      - name: Read pinned Flutter version
        id: flutter_version
        shell: bash
        run: |
          version=$(tr -d '[:space:]' < tools/ja4-spoofer/.flutter-version)
          if [[ -z "$version" ]]; then
            echo "::error::tools/ja4-spoofer/.flutter-version is empty"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Flutter SDK
        id: cache_flutter
        uses: actions/cache@v4
        with:
          path: /root/flutter
          key: flutter-sdk-${{ steps.flutter_version.outputs.version }}-bullseye

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: /root/.pub-cache
          key: pub-cache-${{ steps.flutter_version.outputs.version }}-${{ hashFiles('tools/ja4-spoofer/pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ steps.flutter_version.outputs.version }}-

      - name: Install Flutter
        if: steps.cache_flutter.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 \
            --branch "${{ steps.flutter_version.outputs.version }}" \
            https://github.com/flutter/flutter.git /root/flutter

      - name: Configure Flutter
        shell: bash
        run: |
          echo "/root/flutter/bin" >> "$GITHUB_PATH"
          /root/flutter/bin/flutter --version
          /root/flutter/bin/flutter config --enable-linux-desktop

      - name: Sync bundled-runtime assets from repo root
        run: bash tools/ja4-spoofer/scripts/sync_bundled_runtime.sh

      - name: Install build dependencies
        run: |
          set -e
          # Flutter's native_assets toolchain expects the full LLVM tool
          # set (clang, ld.lld, llvm-ar, llvm-nm, llvm-strip, ...) next to
          # clang-11. clang, lld and llvm together cover them all.
          for i in 1 2 3; do
            apt-get update && \
            apt-get install -y --no-install-recommends --fix-missing \
              clang lld llvm cmake ninja-build pkg-config \
              libgtk-3-dev liblzma-dev dpkg-dev libstdc++-10-dev && break
            echo "apt attempt $i failed, retrying..."
            sleep 5
          done

      - name: Flutter pub get
        working-directory: tools/ja4-spoofer
        run: flutter pub get

      - name: Build .deb
        shell: bash
        run: |
          bash tools/ja4-spoofer/scripts/package_linux_deb.sh \
            --no-sync \
            --version      "$VERSION" \
            --build-number "$BUILD_NUMBER"

      - name: Generate SHA256SUMS
        shell: bash
        working-directory: tools/ja4-spoofer/dist
        run: |
          set -euo pipefail
          : > SHA256SUMS
          for f in *.deb; do
            sha256sum "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Import GPG signing key
        id: gpg
        if: env.GPG_PRIVATE_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --yes --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format=long --with-colons \
            | awk -F: '/^sec:/ {print $5; exit}')
          if [[ -z "$KEY_ID" ]]; then
            echo "::error::no secret key imported"
            exit 1
          fi
          echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Sign .deb and SHA256SUMS
        if: steps.gpg.outputs.available == 'true'
        shell: bash
        working-directory: tools/ja4-spoofer/dist
        run: |
          set -euo pipefail
          for f in *.deb SHA256SUMS; do
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --local-user "${{ steps.gpg.outputs.key_id }}" \
              --detach-sign --armor \
              --output "${f}.asc" "$f"
          done
          ls -la *.asc

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ja4-spoofer-${{ env.VERSION }}-linux-amd64
          path: |
            tools/ja4-spoofer/dist/*.deb
            tools/ja4-spoofer/dist/*.asc
            tools/ja4-spoofer/dist/SHA256SUMS
          retention-days: 30

      - name: Compute release artifact list
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          # ncipollo with artifactErrorsFailBuild=true fails when a glob
          # matches zero files. Without GPG_PRIVATE_KEY no .asc exists, so
          # we enumerate what's actually on disk.
          mapfile -t files < <(find tools/ja4-spoofer/dist -maxdepth 1 \
            \( -name '*.deb' -o -name '*.asc' -o -name 'SHA256SUMS' \) | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::no release artifacts found in dist/"
            exit 1
          fi
          (IFS=,; echo "list=${files[*]}") >> "$GITHUB_OUTPUT"

      - name: Bump pubspec and push release commit
        id: bump
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          perl -0pi -e \
            's/^version:\s+.*/version: '"$VERSION+$BUILD_NUMBER"'/m' \
            tools/ja4-spoofer/pubspec.yaml

          git add tools/ja4-spoofer/pubspec.yaml
          if ! git diff --cached --quiet; then
            git commit -m "release $TAG"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
              "HEAD:${GITHUB_REF_NAME}"
          fi
          # Carry the post-bump commit hash so the release-create step
          # creates the tag at the right commit (not at github.sha).
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section
        shell: bash
        run: |
          set -euo pipefail
          # Pull the `## [VERSION]` block out of CHANGELOG.md and combine it
          # with the static install instructions. CHANGELOG.md is the source
          # of truth for release notes — generateReleaseNotes is disabled.
          if ! grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing an entry for [${VERSION}]"
            echo "::error::Add a section like '## [${VERSION}] — YYYY-MM-DD' before releasing."
            exit 1
          fi
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/      { exit }
            capture                  { print }
          ' CHANGELOG.md > release-body.md
          {
            echo
            echo "---"
            echo
            echo "## Install"
            echo
            echo "APT (recommended):"
            echo
            echo '```bash'
            echo 'sudo apt update && sudo apt install ja4-spoofer'
            echo '```'
            echo
            echo "Direct download:"
            echo
            echo '```bash'
            echo 'sudo dpkg -i ja4-spoofer_*.deb'
            echo 'sudo apt-get install -f   # resolves any missing deps'
            echo '```'
            echo
            echo "Verify the artifact:"
            echo
            echo '```bash'
            echo 'sha256sum -c SHA256SUMS'
            echo 'gpg --verify ja4-spoofer_*.deb.asc ja4-spoofer_*.deb   # if signed'
            echo '```'
            echo
            echo "On first launch the app extracts its scripts, configs and patches to"
            echo '`~/.ja4-spoofer/runtime/<version>/`. No repository checkout needed.'
          } >> release-body.md
          echo "---- release-body.md ----"
          cat release-body.md

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TAG }}
          commit: ${{ steps.bump.outputs.commit || github.sha }}
          name: JA4 Spoofer ${{ env.TAG }}
          artifacts: ${{ steps.artifacts.outputs.list }}
          artifactErrorsFailBuild: true
          allowUpdates: true
          makeLatest: true
          generateReleaseNotes: false
          bodyFile: release-body.md
