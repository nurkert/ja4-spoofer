name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter analyze + test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read pinned Flutter version
        id: flutter_version
        run: |
          v=$(tr -d '[:space:]' < tools/ja4-spoofer/.flutter-version)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          cache: true

      - name: Flutter pub get
        working-directory: tools/ja4-spoofer
        run: flutter pub get

      - name: Dart format check
        working-directory: tools/ja4-spoofer
        run: dart format --output=none --set-exit-if-changed .

      - name: Flutter analyze
        working-directory: tools/ja4-spoofer
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Flutter test
        working-directory: tools/ja4-spoofer
        run: flutter test

  shell:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update -q && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -euo pipefail
          # Lint the shell scripts that ship in the bundled runtime.
          #   -x  follow `source` directives so cross-file lookups work
          #       (e.g. `submodules` defined in lib.sh, consumed elsewhere).
          # Excluded codes:
          #   SC1090/SC1091 — sourced from variable path (intentional)
          #   SC2034        — declared-but-unused (browser declarations are
          #                   consumed after `source`; covered case-by-case
          #                   by inline disables where applicable).
          find scripts tools/ja4-spoofer/scripts -name '*.sh' -print0 \
            | xargs -0 shellcheck -x -e SC1090,SC1091,SC2034
