version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "bump"
      include: scope

  - package-ecosystem: pub
    directory: /tools/ja4-spoofer
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "bump"
      include: scope
