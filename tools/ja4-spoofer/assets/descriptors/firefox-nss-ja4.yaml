app_id: firefox-nss-ja4
metadata:
  name: Firefox (NSS)
  description: Firefox with patched NSS for JA4 fingerprint control
  icon_url: https://upload.wikimedia.org/wikipedia/commons/a/ab/Firefox_Nightly_logo%2C_2017.svg
build:
  script: scripts/build_firefox_with_patched_nss.sh
  ssl_only_script: scripts/build_nss.sh
  built_binary_paths:
    - ~/build/firefox-ja4-stable/gecko-dev/obj-ja4-stable/dist/Nightly.app/Contents/MacOS/firefox
    - ~/build/firefox-ja4-stable/gecko-dev/obj-ja4-stable/dist/Firefox.app/Contents/MacOS/firefox
    - ~/build/firefox-ja4-stable/gecko-dev/obj-ja4-stable/dist/bin/firefox
  requirements:
    - name: Xcode CommandLineTools
      hint: "macOS only — 'xcode-select --install'. Full Xcode also works."
    - name: git
      hint: "Bundled with Xcode CLT on macOS  •  Linux: 'apt install git'"
    - name: Python
      version: "<= 3.12"
      hint: "macOS: 'brew install python@3.12'  •  Linux: 'apt install python3.12'"
    - name: bash
      version: ">= 4"
      hint: "macOS: 'brew install bash' (system bash 3.2 is too old)  •  Linux: pre-installed"
    - name: mercurial
      hint: "Used by 'mach bootstrap' to fetch some Mozilla tooling. macOS: 'brew install mercurial'  •  Linux: 'apt install mercurial'"
    - name: rustup
      hint: "Mozilla's mach bootstrap auto-installs Rust into ~/.mozbuild/. If you have a system rustup it must support recent stable channels (>= 1.83)."
    - name: "free disk space (~25 GB)"
      hint: "Firefox source tree + objdir + bundled toolchain. SSDs strongly recommended."
launch:
  script: scripts/run_firefox_with_ja4.sh
  profile_format: nss
  dump_path: /tmp/nss-ja4-effective.conf

tls_defaults:
  tls_versions: ["1.0", "1.1", "1.2", "1.3"]
  cipher_suites:
    # TLS 1.3
    - 4865   # TLS_AES_128_GCM_SHA256
    - 4866   # TLS_AES_256_GCM_SHA384
    - 4867   # TLS_CHACHA20_POLY1305_SHA256
    # TLS 1.2 ECDHE
    - 49195  # TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    - 49196  # TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - 49199  # TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - 49200  # TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - 49161  # TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA
    - 49162  # TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA
    - 52393  # TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
    - 52392  # TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    - 49171  # TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA
    - 49172  # TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA
    - 156    # TLS_RSA_WITH_AES_128_GCM_SHA256
    - 157    # TLS_RSA_WITH_AES_256_GCM_SHA384
    - 47     # TLS_RSA_WITH_AES_128_CBC_SHA
    - 53     # TLS_RSA_WITH_AES_256_CBC_SHA
  extensions:
    - 0      # server_name
    - 5      # status_request
    - 10     # supported_groups
    - 11     # ec_point_formats
    - 13     # signature_algorithms
    - 16     # application_layer_protocol_negotiation (ALPN)
    - 23     # extended_master_secret
    - 28     # record_size_limit
    - 34     # delegated_credentials
    - 35     # session_ticket (old)
    - 43     # supported_versions
    - 45     # psk_key_exchange_modes
    - 51     # key_share
    - 65281  # renegotiation_info
  signature_algorithms:
    - 1025   # rsa_pkcs1_sha256
    - 1027   # rsa_pss_rsae_sha256
    - 1281   # rsa_pkcs1_sha384
    - 1283   # rsa_pss_rsae_sha384
    - 1537   # rsa_pkcs1_sha512
    - 1539   # rsa_pss_rsae_sha512
    - 2052   # ecdsa_secp256r1_sha256
    - 2053   # ecdsa_secp384r1_sha384
  alpn_protocols: [h2, http/1.1]
