app_id: curl-openssl-ja4
metadata:
  name: curl (OpenSSL)
  description: OpenSSL JA4 control path for curl-like clients; verified with the bundled openssl CLI or a custom curl linked against patched OpenSSL
  icon_url: https://curl.se/logo/curl-logo.svg
build:
  script: scripts/build_curl_with_openssl.sh
  built_binary_paths:
    - ~/build/curl-openssl-ja4/install/bin/curl
    - ~/build/openssl-ja4-standalone/install/bin/openssl
    - ~/build/openssl-ja4-standalone/install/lib/libssl.a
    - ~/build/openssl-ja4-standalone/install/lib/libssl.dylib
    - ~/build/openssl-ja4-standalone/install/lib/libssl.so
  requirements:
    - name: git
      hint: "macOS: 'xcode-select --install'  •  Linux: 'apt install git' / 'dnf install git'"
    - name: cc
      hint: "C compiler (clang/gcc) — macOS: 'xcode-select --install'  •  Linux: 'apt install build-essential'"
    - name: make
      hint: "GNU Make — macOS: included in CommandLineTools  •  Linux: 'apt install make'"
    - name: perl
      hint: "Required by OpenSSL Configure — macOS: pre-installed  •  Linux: 'apt install perl'"
    - name: tar
      hint: "Bundled with macOS/Linux — only relevant on minimal containers"
    - name: curl
      hint: "Used to fetch the upstream curl release tarball — macOS/Linux: usually pre-installed"
launch:
  script: scripts/run_curl_with_ja4.sh
  profile_format: openssl
  dump_path: /tmp/openssl-ja4-effective.conf
  runtime:
    kind: cli
    args_placeholder: https://..
    args_example: -I https://example.com
    pass_user_args_after_double_dash: true

tls_defaults:
  tls_versions: ["1.0", "1.1", "1.2", "1.3"]
  cipher_suites:
    # TLS 1.3
    - 4865   # TLS_AES_128_GCM_SHA256
    - 4866   # TLS_AES_256_GCM_SHA384
    - 4867   # TLS_CHACHA20_POLY1305_SHA256
    # TLS 1.2 ECDHE
    - 49195  # TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    - 49199  # TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - 49196  # TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - 49200  # TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - 52393  # TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
    - 52392  # TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    - 49171  # TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA
    - 49172  # TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA
    # TLS 1.2 RSA
    - 156    # TLS_RSA_WITH_AES_128_GCM_SHA256
    - 157    # TLS_RSA_WITH_AES_256_GCM_SHA384
    - 47     # TLS_RSA_WITH_AES_128_CBC_SHA
    - 53     # TLS_RSA_WITH_AES_256_CBC_SHA
  extensions:
    - 0      # server_name
    - 5      # status_request
    - 10     # supported_groups
    - 11     # ec_point_formats
    - 13     # signature_algorithms
    - 16     # application_layer_protocol_negotiation
    - 23     # extended_master_secret
    - 35     # session_ticket
    - 43     # supported_versions
    - 45     # psk_key_exchange_modes
    - 51     # key_share
    - 65281  # renegotiation_info
  signature_algorithms:
    - 1027   # rsa_pss_rsae_sha256
    - 1283   # rsa_pss_rsae_sha384
    - 1539   # rsa_pss_rsae_sha512
    - 2052   # ecdsa_secp256r1_sha256
    - 2053   # ecdsa_secp384r1_sha384
    - 2054   # ecdsa_secp521r1_sha512
    - 1025   # rsa_pkcs1_sha256
    - 1281   # rsa_pkcs1_sha384
    - 1537   # rsa_pkcs1_sha512
  alpn_protocols: [h2, http/1.1]
